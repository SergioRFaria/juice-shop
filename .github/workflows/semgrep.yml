name: Semgrep SAST

on:
  workflow_dispatch:
  push:
    branches:
      - sast-before
      - sast-after
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep OWASP SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report folder
        run: mkdir -p reports/semgrep

      - name: Run Semgrep OWASP scan - JSON
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/owasp-top-ten \
              --exclude node_modules \
              --exclude .git \
              --exclude dist \
              --exclude build \
              --json \
              --output "reports/semgrep/semgrep-owasp-${GITHUB_REF_NAME}.json" \
              .

      - name: Run Semgrep OWASP scan - SARIF
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/owasp-top-ten \
              --exclude node_modules \
              --exclude .git \
              --exclude dist \
              --exclude build \
              --sarif \
              --output "reports/semgrep/semgrep-owasp-${GITHUB_REF_NAME}.sarif" \
              .

      - name: Generate CSV summary
        run: |
          python3 - <<'PY'
          import json
          import csv
          import os

          branch = os.environ["GITHUB_REF_NAME"]
          json_file = f"reports/semgrep/semgrep-owasp-{branch}.json"
          csv_file = f"reports/semgrep/semgrep-owasp-{branch}.csv"

          with open(json_file, "r", encoding="utf-8") as f:
              data = json.load(f)

          results = data.get("results", [])

          with open(csv_file, "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["severity", "rule_id", "file", "line", "message"])

              for finding in results:
                  writer.writerow([
                      finding.get("extra", {}).get("severity", ""),
                      finding.get("check_id", ""),
                      finding.get("path", ""),
                      finding.get("start", {}).get("line", ""),
                      finding.get("extra", {}).get("message", "").replace("\n", " ")
                  ])

          print(f"Total Semgrep findings: {len(results)}")
          PY

      - name: Upload reports as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report-${{ github.ref_name }}
          path: reports/semgrep/
          retention-days: 30

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/semgrep/semgrep-owasp-${{ github.ref_name }}.sarif
          category: semgrep-owasp
